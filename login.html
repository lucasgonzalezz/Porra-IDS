<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PorraPLUS ELITE — Login</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">i

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* pitch lines bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,80,20,0.18) 0%, transparent 70%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 50px);
      pointer-events: none;
    }

    .login-box {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      position: relative;
      animation: rise 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes rise {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      border-radius: 10px;
    }

    .login-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      letter-spacing: 3px;
      color: #00c853;
      line-height: 1;
    }

    .login-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: #6b7a99;
      margin-top: 4px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b7a99;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0a0e1a;
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #00c853; }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: #00c853;
      border: none;
      border-radius: 10px;
      color: black;
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover { background: #00e65c; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      background: rgba(244,67,54,0.12);
      border: 1px solid rgba(244,67,54,0.3);
      color: #f44336;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.png" class="login-img" alt="PorraPLUS ELITE">
      <div class="login-title">PORRA<span style="color:#ffab00">PLUS</span></div>
      <div class="login-sub">ELITE · ACCESO</div>
    </div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    fetch("/api/me").then(r => r.json()).then(d => {
      if (d.authenticated) window.location = "/";
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("errorMsg");
      errEl.style.display = "none";

      if (!username || !password) {
        errEl.textContent = "Introduce usuario y contraseña";
        errEl.style.display = "block";
        return;
      }

      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location = "/";
      } else {
        errEl.textContent = data.error || "Credenciales incorrectas";
        errEl.style.display = "block";
        document.getElementById("password").value = "";
      }
    }
  </script>
</body>
</html>
